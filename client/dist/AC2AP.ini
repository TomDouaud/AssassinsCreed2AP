[ac2ap]
; Path to the game save the client watches. Leave blank to auto-detect, in this order:
;   1. Ubisoft Connect: C:\Program Files (x86)\Ubisoft\Ubisoft Game Launcher\savegames\<id>\4\<slot>.save
;   2. Skidrow:         %LOCALAPPDATA%\storage\SKIDROW\4\1.save
; If auto-detect fails, set the full path OF THE .save FILE itself here - not the
; folder that contains it (NO quotes, spaces are fine), e.g.:
;   save_path=C:\Program Files (x86)\Ubisoft\Ubisoft Game Launcher\savegames\1234567\4\1.save
; A green "Save found" toast in-game confirms it worked; a red one means edit this.
; NOTE: play on save SLOT 1 (this watches 1.save). And turn OFF Ubisoft Connect cloud
; save sync (Settings > General) - otherwise Ubisoft overwrites your local save at launch.
save_path=
; --- Connection ---
; You do NOT need to edit these: in-game, press F8 (or INSERT) to open the connection
; menu and type your server / slot / password there. These values just pre-fill that menu
; and are saved back to this file when you connect. Left blank on purpose: if both are
; set, the client auto-connects to them at launch (handy once they are YOUR values).
server=
slot=
password=
; 1 = install the RAM hooks needed for traps / DeathLink. 0 = detection only, no code patch.
enable_health_hook=1
; 1 = in-game overlay (D3D9): toasts for received items, checks, connection, goal. Experimental.
enable_overlay=1
; Overlay corner: 0=top-left 1=top-right 2=bottom-left 3=bottom-right (also set live in the F8 menu).
toast_corner=1
status_corner=2
