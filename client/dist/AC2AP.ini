[ac2ap]
; Path to the game save the client watches. Leave blank to auto-detect, in this order:
;   1. Ubisoft Connect: %LOCALAPPDATA%\Ubisoft Game Launcher\savegames\<account-id>\4\1.save
;   2. Skidrow:         %LOCALAPPDATA%\storage\SKIDROW\4\1.save
; Set an explicit path here only if auto-detect picks the wrong save.
save_path=
; Archipelago server address (host:port).
server=archipelago.gg:38281
; Your slot / player name in the multiworld.
slot=YourSlotName
; Room password (leave blank if none).
password=
; 1 = install the RAM hooks needed for traps / DeathLink. 0 = detection only, no code patch.
enable_health_hook=1
; 1 = in-game overlay (D3D9): toasts for received items, checks, connection, goal. Experimental.
enable_overlay=1
